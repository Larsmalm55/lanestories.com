<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lane Stories</title>
  <meta name="description" content="Guided walks through hidden history. Scan. Choose. Walk." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --gold:#c9a96e; --gold-dim:rgba(201,169,110,0.4); --gold-faint:rgba(201,169,110,0.1);
      --ink:#0d0a07; --ink2:#151008; --cream:#f0e6d0; --cream-dim:#c8b896;
      --muted:#7a6a52; --border:rgba(232,220,200,0.12);
    }
    html { scroll-behavior:smooth; }
    body { background:var(--ink); color:var(--cream); font-family:'EB Garamond',Georgia,serif; line-height:1.6; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; }

    .hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 28px 80px; position:relative; overflow:hidden; }
    .hero-bg { position:absolute; inset:0; background:radial-gradient(ellipse 70% 50% at 50% 55%, rgba(201,169,110,0.09) 0%, transparent 70%), radial-gradient(ellipse 40% 60% at 15% 40%, rgba(201,169,110,0.04) 0%, transparent 60%); }
    .hero-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(201,169,110,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.05) 1px,transparent 1px); background-size:48px 48px; mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%); }

    .hero-logo { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); margin-bottom:48px; display:flex; align-items:center; gap:14px; animation:fadeUp 0.7s ease both; }
    .hero-logo::before, .hero-logo::after { content:''; width:32px; height:1px; background:var(--gold-dim); }
    .hero-hook { font-family:'Cormorant Garamond',serif; font-size:clamp(38px,9vw,72px); font-weight:300; line-height:1.08; color:var(--cream); margin-bottom:20px; animation:fadeUp 0.7s 0.1s ease both; }
    .hero-hook em { font-style:italic; color:var(--gold); }
    .hero-sub { font-size:clamp(16px,3vw,20px); font-style:italic; color:var(--cream-dim); max-width:420px; line-height:1.6; margin-bottom:40px; animation:fadeUp 0.7s 0.2s ease both; }
    .pills { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:44px; animation:fadeUp 0.7s 0.3s ease both; }
    .pill { display:flex; align-items:center; gap:8px; padding:9px 16px; border:1px solid rgba(201,169,110,0.25); border-radius:40px; font-size:13px; color:var(--cream-dim); background:rgba(201,169,110,0.05); }
    .pill-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); flex-shrink:0; }
    .hero-cta { animation:fadeUp 0.7s 0.4s ease both; display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; max-width:340px; }
    .btn-big { display:block; width:100%; padding:18px 32px; background:linear-gradient(135deg,#c9a96e,#8a5a2a); color:var(--ink); border:none; border-radius:2px; font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; text-decoration:none; transition:opacity 0.2s,transform 0.2s; }
    .btn-big:hover { opacity:0.88; transform:translateY(-2px); }
    .hero-price { font-size:13px; color:var(--muted); }
    .hero-price strong { color:var(--gold); font-weight:400; }
    .scroll-hint { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--muted); font-size:10px; letter-spacing:0.2em; text-transform:uppercase; animation:fadeIn 1s 1.2s ease both; }
    .scroll-line { width:1px; height:36px; background:linear-gradient(var(--gold-dim),transparent); animation:scrollPulse 2s infinite; }

    .how { padding:80px 28px; max-width:600px; margin:0 auto; }
    .eyebrow { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); display:flex; align-items:center; gap:14px; margin-bottom:32px; }
    .eyebrow::after { content:''; flex:1; max-width:48px; height:1px; background:var(--gold-dim); }
    .steps-visual { display:flex; flex-direction:column; }
    .step-row { display:grid; grid-template-columns:48px 1fr; gap:20px; align-items:flex-start; position:relative; }
    .step-row:not(:last-child)::before { content:''; position:absolute; left:23px; top:48px; bottom:-16px; width:1px; background:var(--border); }
    .step-circle { width:48px; height:48px; border-radius:50%; border:1px solid var(--gold-dim); display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--ink); flex-shrink:0; position:relative; z-index:1; }
    .step-text { padding:10px 0 32px; }
    .step-title { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.08em; color:var(--cream); margin-bottom:6px; }
    .step-desc { font-size:14px; color:var(--muted); line-height:1.65; }

    .taste { background:var(--ink2); border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:64px 28px; }
    .taste-inner { max-width:560px; margin:0 auto; }
    .story-preview { border-left:2px solid var(--gold); padding:4px 0 4px 24px; margin:28px 0; }
    .story-preview p { font-family:'Cormorant Garamond',serif; font-size:clamp(18px,3.5vw,24px); font-style:italic; font-weight:300; color:var(--cream-dim); line-height:1.65; margin-bottom:0; }
    .story-preview .attr { font-family:'EB Garamond',serif; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-style:normal; margin-top:16px; display:block; }

    .cities { padding:80px 28px; max-width:700px; margin:0 auto; }
    .cities-grid { display:flex; flex-direction:column; gap:12px; margin-top:32px; }
    .city-row { display:flex; align-items:center; border:1px solid var(--border); border-radius:2px; padding:18px 20px; gap:18px; text-decoration:none; color:inherit; transition:border-color 0.25s,background 0.25s,transform 0.2s; background:rgba(255,255,255,0.015); }
    .city-row:not(.dim):hover { border-color:var(--gold-dim); background:rgba(201,169,110,0.04); transform:translateX(4px); }
    .city-row.dim { opacity:0.38; cursor:default; pointer-events:none; }
    .city-icon { font-size:28px; flex-shrink:0; width:44px; text-align:center; }
    .city-info { flex:1; }
    .city-name { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--cream); line-height:1.2; margin-bottom:3px; }
    .city-tagline { font-size:12px; color:var(--muted); font-style:italic; }
    .city-right { text-align:right; flex-shrink:0; }
    .city-price { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--gold); }
    .city-status { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-top:2px; }
    .city-status.live { color:var(--gold); }

    /* Language switcher */
    .lang-toggle { position:fixed; top:18px; right:20px; z-index:200; display:flex; gap:6px; }
    .lang-btn { padding:5px 12px; border:1px solid var(--border); border-radius:20px; background:rgba(13,10,7,0.8); color:var(--muted); font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; cursor:pointer; transition:border-color 0.2s,color 0.2s; backdrop-filter:blur(8px); }
    .lang-btn.active { border-color:var(--gold-dim); color:var(--gold); }

    footer { padding:36px 28px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px; }
    .footer-logo { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.2em; color:var(--gold); }
    .footer-links { display:flex; gap:20px; }
    .footer-links a { font-size:12px; color:var(--muted); text-decoration:none; letter-spacing:0.08em; transition:color 0.2s; }
    .footer-links a:hover { color:var(--cream); }
    .footer-copy { font-size:11px; color:#3a3028; width:100%; text-align:center; }

    .modal-overlay { position:fixed; inset:0; background:rgba(13,10,7,0.92); z-index:300; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; pointer-events:none; transition:opacity 0.3s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--ink2); border:1px solid var(--border); border-radius:4px; max-width:440px; width:100%; padding:36px; position:relative; transform:translateY(20px); transition:transform 0.3s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-close { position:absolute; top:14px; right:18px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:22px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes scrollPulse { 0%,100%{opacity:.35} 50%{opacity:1} }
    @media(max-width:480px){
      .hero{padding:52px 20px 72px} .how,.cities,footer{padding-left:20px;padding-right:20px}
      .taste{padding:52px 20px} footer{flex-direction:column;text-align:center}
      .footer-links{justify-content:center}
    }
  </style>
</head>
<body>

<!-- Language toggle -->
<div class="lang-toggle">
  <button class="lang-btn" id="btn-no" onclick="setLang('no')">NO</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-logo">Lane Stories</div>
  <h1 class="hero-hook" id="h-hook"></h1>
  <p class="hero-sub" id="h-sub"></p>
  <div class="pills">
    <div class="pill"><span class="pill-dot"></span><span id="p1"></span></div>
    <div class="pill"><span class="pill-dot"></span><span id="p2"></span></div>
    <div class="pill"><span class="pill-dot"></span><span id="p3"></span></div>
  </div>
  <div class="hero-cta">
    <a href="#cities" class="btn-big" id="h-cta"></a>
    <span class="hero-price" id="h-price"></span>
  </div>
  <div class="scroll-hint"><div class="scroll-line"></div><span id="h-scroll"></span></div>
</section>

<!-- HOW -->
<section class="how">
  <div class="eyebrow" id="how-label"></div>
  <div class="steps-visual">
    <div class="step-row"><div class="step-circle">📍</div><div class="step-text"><div class="step-title" id="s1t"></div><p class="step-desc" id="s1d"></p></div></div>
    <div class="step-row"><div class="step-circle">💳</div><div class="step-text"><div class="step-title" id="s2t"></div><p class="step-desc" id="s2d"></p></div></div>
    <div class="step-row"><div class="step-circle">🚶</div><div class="step-text"><div class="step-title" id="s3t"></div><p class="step-desc" id="s3d"></p></div></div>
    <div class="step-row"><div class="step-circle">🍷</div><div class="step-text"><div class="step-title" id="s4t"></div><p class="step-desc" id="s4d"></p></div></div>
  </div>
</section>

<!-- TASTE -->
<section class="taste">
  <div class="taste-inner">
    <div class="eyebrow" id="taste-label"></div>
    <p style="font-size:15px;color:var(--muted);line-height:1.75;margin-bottom:4px;" id="taste-intro"></p>
    <div class="story-preview">
      <p id="taste-quote"></p>
      <span class="attr">— Hollendergaten 3, Bergen · 1641</span>
    </div>
    <p style="font-size:14px;color:var(--muted);line-height:1.7;" id="taste-outro"></p>
  </div>
</section>

<!-- CITIES -->
<section class="cities" id="cities">
  <div class="eyebrow" id="cities-label"></div>
  <h2 style="font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vw,42px);font-weight:300;color:var(--cream);line-height:1.2;margin-bottom:8px;" id="cities-title"></h2>
  <p style="font-size:14px;color:var(--muted);" id="cities-sub"></p>
  <div class="cities-grid">

      <div class="city-info"><div class="city-name">Bergen</div><div class="city-tagline" id="c-bergen"></div></div>

    <div class="city-row dim"><div class="city-icon">🏰</div><div class="city-info"><div class="city-name">Oslo</div><div class="city-tagline" id="c-oslo"></div></div><div class="city-right"><div class="city-price" style="font-size:14px;color:var(--muted);" id="c-soon2"></div><div class="city-status">2025</div></div></div>
    <div class="city-row dim"><div class="city-icon">🛢️</div><div class="city-info"><div class="city-name">Stavanger</div><div class="city-tagline" id="c-stavanger"></div></div><div class="city-right"><div class="city-price" style="font-size:14px;color:var(--muted);" id="c-soon3"></div><div class="city-status">2025</div></div></div>
    <div class="city-row dim"><div class="city-icon">⚔️</div><div class="city-info"><div class="city-name">Tønsberg</div><div class="city-tagline" id="c-tonsberg"></div></div><div class="city-right"><div class="city-price" style="font-size:14px;color:var(--muted);" id="c-soon4"></div><div class="city-status">2026</div></div></div>
    <div class="city-row dim"><div class="city-icon">🌊</div><div class="city-info"><div class="city-name">Ålesund</div><div class="city-tagline" id="c-alesund"></div></div><div class="city-right"><div class="city-price" style="font-size:14px;color:var(--muted);" id="c-soon5"></div><div class="city-status">2026</div></div></div>
  </div>
</section>

<footer>
  <div class="footer-logo">Lane Stories</div>
  <div class="footer-links">
    <a href="#cities" id="f-cities"></a>
    <a href="#" onclick="document.getElementById('contactModal').classList.add('open');return false;" id="f-partners"></a>
    <a href="mailto:hello@lanestories.com" id="f-contact"></a>
  </div>
  <div class="footer-copy" id="f-copy"></div>
</footer>

<!-- PARTNER MODAL -->
<div class="modal-overlay" id="contactModal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('contactModal').classList.remove('open')">×</button>
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.3em;color:var(--gold);margin-bottom:14px;text-transform:uppercase;" id="m-label"></div>
    <h3 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--cream);margin-bottom:12px;" id="m-title"></h3>
    <p style="font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:24px;" id="m-body"></p>
    <a href="mailto:hello@lanestories.com" style="display:block;width:100%;padding:15px;background:linear-gradient(135deg,#c9a96e,#8a5a2a);color:var(--ink);border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;text-align:center;">hello@lanestories.com</a>
  </div>
</div>

<script>
const T = {

// Detect and persist language
function detectLang() {
  const saved = localStorage.getItem('ls_lang');
  if (saved) return saved;
  return navigator.language.startsWith('no') ? 'no' : 'en';
}

function setLang(lang) {
  localStorage.setItem('ls_lang', lang);
  applyLang(lang);
}

function applyLang(lang) {
  const t = T[lang];
  document.documentElement.lang = lang;

  // Hero
  document.getElementById('h-hook').innerHTML   = t.hook;
  document.getElementById('h-sub').textContent  = t.sub;
  document.getElementById('p1').textContent     = t.p1;
  document.getElementById('p2').textContent     = t.p2;
  document.getElementById('p3').textContent     = t.p3;
  document.getElementById('h-cta').textContent  = t.cta;
  document.getElementById('h-price').innerHTML  = t.price;
  document.getElementById('h-scroll').textContent = t.scroll;

  // How
  document.getElementById('how-label').textContent = t.howLabel;
  document.getElementById('s1t').textContent = t.s1t; document.getElementById('s1d').textContent = t.s1d;
  document.getElementById('s2t').textContent = t.s2t; document.getElementById('s2d').textContent = t.s2d;
  document.getElementById('s3t').textContent = t.s3t; document.getElementById('s3d').textContent = t.s3d;
  document.getElementById('s4t').textContent = t.s4t; document.getElementById('s4d').textContent = t.s4d;

  // Taste
  document.getElementById('taste-label').textContent = t.tasteLabel;
  document.getElementById('taste-intro').textContent = t.tasteIntro;
  document.getElementById('taste-quote').textContent = t.tasteQuote;
  document.getElementById('taste-outro').textContent = t.tasteOutro;

  // Cities
  document.getElementById('cities-label').textContent = t.citiesLabel;
  document.getElementById('cities-title').textContent = t.citiesTitle;
  document.getElementById('cities-sub').textContent   = t.citiesSub;
  document.getElementById('c-bergen').textContent     = t.cBergen;
  document.getElementById('c-bergen-price').textContent  = t.bergenPrice;
  document.getElementById('c-bergen-status').textContent = t.bergenStatus;
  document.getElementById('c-trondheim').textContent  = t.cTrondheim;
  document.getElementById('c-oslo').textContent       = t.cOslo;
  document.getElementById('c-stavanger').textContent  = t.cStavanger;
  document.getElementById('c-tonsberg').textContent   = t.cTonsberg;
  document.getElementById('c-alesund').textContent    = t.cAlesund;
  ['c-soon1','c-soon2','c-soon3','c-soon4','c-soon5'].forEach(id =>
    document.getElementById(id).textContent = t.soon);

  // Footer
  document.getElementById('f-cities').textContent   = t.fCities;
  document.getElementById('f-partners').textContent = t.fPartners;
  document.getElementById('f-contact').textContent  = t.fContact;
  document.getElementById('f-copy').textContent     = t.fCopy;

  // Modal
  document.getElementById('m-label').textContent = t.mLabel;
  document.getElementById('m-title').textContent = t.mTitle;
  document.getElementById('m-body').textContent  = t.mBody;

  // Toggle buttons
  document.getElementById('btn-no').classList.toggle('active', lang === 'no');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  // Save lang for bergen.html to pick up
  localStorage.setItem('ls_lang', lang);
}

// Init
applyLang(detectLang());

// Smooth scroll
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const t = document.querySelector(a.getAttribute('href'));
    if (t) { e.preventDefault(); t.scrollIntoView({ behavior:'smooth' }); }
  });
});

// Fade in on scroll
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; } });
}, { threshold:0.1 });
document.querySelectorAll('.step-row, .city-row, .story-preview').forEach(el => {
  el.style.opacity='0'; el.style.transform='translateY(14px)';
  el.style.transition='opacity 0.55s ease, transform 0.55s ease';
  obs.observe(el);
});
</script>
