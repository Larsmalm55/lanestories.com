<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lane Stories – Rute</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<script src="routes.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --ink:        #0C0B09;
  --paper:      #F0EBE0;
  --warm:       #E8E1D4;
  --dark:       #1A1612;
  --amber:      #B07830;
  --amber2:     #C98E3A;
  --muted:      #8A7E72;
  --line:       rgba(12,11,9,.10);
  --line-light: rgba(255,255,255,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--paper); color:var(--ink); font-family:'Outfit',sans-serif; font-weight:300; }

/* TEST BANNER */
.test-banner {
  background:#2A6E2A; color:#fff; text-align:center;
  padding:9px 20px; font-size:.68rem; letter-spacing:.1em;
  text-transform:uppercase; font-weight:500; position:sticky; top:0; z-index:300;
}
.test-banner span { opacity:.6; font-weight:300; text-transform:none; letter-spacing:0; margin-left:8px; font-size:.66rem; }
@media(max-width:500px){ .test-banner span { display:none; } }

/* NAV */
nav {
  padding:0 5vw; height:56px;
  display:flex; justify-content:space-between; align-items:center;
  background:var(--dark); border-bottom:1px solid var(--line-light);
}
.nav-logo { font-family:'Libre Baskerville',serif; font-size:1rem; color:var(--paper); text-decoration:none; }
.nav-logo span { color:var(--amber); }
.nav-back { font-size:.7rem; color:rgba(240,235,224,.35); text-decoration:none; letter-spacing:.03em; transition:color .2s; }
.nav-back:hover { color:var(--amber); }

/* ROUTE HEADER */
.route-header {
  background:var(--dark); color:var(--paper);
  padding:52px 6vw 56px; position:relative; overflow:hidden;
}
.route-header::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 55% 65% at 85% 40%, rgba(176,120,48,.10) 0%, transparent 65%);
}
.rh-inner { position:relative; z-index:2; max-width:700px; }
.rh-kicker { font-size:.54rem; letter-spacing:.26em; text-transform:uppercase; color:var(--amber2); margin-bottom:14px; }
.rh-title  { font-family:'Libre Baskerville',serif; font-size:clamp(2rem,5vw,3.8rem); font-weight:400; font-style:italic; line-height:1.05; margin-bottom:12px; }
.rh-sub    { font-size:.88rem; color:rgba(240,235,224,.45); line-height:1.75; margin-bottom:24px; max-width:52ch; }
.rh-meta   { display:flex; gap:20px; flex-wrap:wrap; }
.rh-meta-item { font-size:.7rem; color:rgba(240,235,224,.3); display:flex; align-items:center; gap:6px; }
.rh-meta-item strong { color:rgba(240,235,224,.65); font-weight:400; }

/* PROGRESS BAR */
.progress-bar {
  background:var(--ink); padding:0 5vw;
  display:flex; gap:0; border-bottom:1px solid rgba(255,255,255,.05);
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.pb-stop {
  display:flex; align-items:center; gap:9px;
  padding:14px 20px 14px 0; cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:all .2s; flex-shrink:0;
}
.pb-stop.active { border-bottom-color:var(--amber); }
.pb-stop.active .pb-name { color:var(--amber2); }
.pb-num {
  width:22px; height:22px; border-radius:50%;
  background:rgba(255,255,255,.07);
  display:flex; align-items:center; justify-content:center;
  font-size:.64rem; color:rgba(240,235,224,.35);
  font-family:'Libre Baskerville',serif; flex-shrink:0; transition:all .3s;
}
.pb-name { font-size:.68rem; color:rgba(240,235,224,.28); letter-spacing:.02em; white-space:nowrap; }

/* LAYOUT */
.route-main {
  display:grid; grid-template-columns:1fr 320px; gap:0;
  min-height:calc(100vh - 210px);
}
@media(max-width:780px){ .route-main { grid-template-columns:1fr; } .map-panel { display:none; } }

/* STORY PANEL */
.story-panel { padding:48px 6vw 120px; max-width:720px; }

.stop-tag {
  font-size:.54rem; letter-spacing:.24em; text-transform:uppercase;
  color:var(--amber); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.stop-dot { width:6px; height:6px; border-radius:50%; background:var(--amber); animation:pulse 2s ease-in-out infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.8);} }

.stop-title { font-family:'Libre Baskerville',serif; font-size:clamp(1.7rem,3.5vw,2.6rem); font-weight:400; line-height:1.08; margin-bottom:6px; }
.stop-venue { font-size:.76rem; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.stop-venue::before { content:'📍'; font-size:.78rem; }
.stop-drink {
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(176,120,48,.08); border:1px solid rgba(176,120,48,.18);
  padding:7px 14px; font-size:.7rem; color:var(--amber); margin-bottom:32px;
}

/* AUDIO */
.audio-player {
  background:var(--warm); border:1px solid var(--line);
  padding:14px 18px; display:flex; align-items:center; gap:12px; margin-bottom:32px;
}
.audio-btn {
  width:38px; height:38px; border-radius:50%; background:var(--amber);
  border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:.95rem; flex-shrink:0; transition:background .2s;
}
.audio-btn:hover { background:var(--amber2); }
.audio-label { font-size:.7rem; color:var(--muted); }
.audio-label strong { display:block; color:var(--ink); font-weight:400; font-size:.78rem; margin-bottom:2px; }

/* STORY BODY */
.story-body { font-family:'Libre Baskerville',serif; font-size:1rem; line-height:1.95; color:var(--ink); margin-bottom:32px; }
.story-body p { margin-bottom:1.4em; }
.story-body p:last-child { margin-bottom:0; }

/* PULLQUOTE */
.pullquote {
  border-left:2px solid var(--amber); padding:16px 20px;
  margin:32px 0; background:rgba(176,120,48,.04);
}
.pullquote p { font-family:'Libre Baskerville',serif; font-style:italic; font-size:1.04rem; line-height:1.75; }

/* HISTORY BOX */
.history-box {
  background:var(--dark); color:var(--paper);
  padding:24px 22px; margin:28px 0;
  border-left:3px solid var(--amber);
}
.hb-label { font-size:.52rem; letter-spacing:.22em; text-transform:uppercase; color:var(--amber2); margin-bottom:10px; }
.hb-text  { font-size:.84rem; line-height:1.82; color:rgba(240,235,224,.65); font-family:'Libre Baskerville',serif; font-style:italic; }

/* DRINK TIP */
.drink-tip {
  background:var(--warm); border:1px solid var(--line);
  padding:18px 20px; margin:28px 0;
  display:flex; gap:14px; align-items:flex-start;
}
.dt-icon  { font-size:1.4rem; flex-shrink:0; margin-top:2px; }
.dt-label { font-size:.54rem; letter-spacing:.2em; text-transform:uppercase; color:var(--amber); margin-bottom:6px; }
.dt-text  { font-size:.8rem; color:var(--muted); line-height:1.68; }
.dt-text strong { color:var(--ink); font-weight:500; }

/* COMPLETION BOX */
.completion-box {
  margin-top:36px; padding:24px;
  background:var(--warm); border:1px solid var(--line);
}
.completion-label { font-size:.58rem; letter-spacing:.2em; text-transform:uppercase; color:var(--amber); margin-bottom:10px; }
.completion-text  { font-size:.84rem; color:var(--muted); line-height:1.7; }
.completion-link  { display:inline-block; margin-top:14px; color:var(--amber); text-decoration:none; font-size:.82rem; }
.completion-link:hover { text-decoration:underline; }

/* STOP NAV */
.stop-nav {
  display:flex; gap:10px; padding-top:32px;
  border-top:1px solid var(--line);
}
.stop-nav-btn {
  padding:13px 22px; font-family:'Outfit',sans-serif; font-size:.74rem;
  letter-spacing:.06em; cursor:pointer; transition:all .2s;
  text-decoration:none; display:inline-flex; align-items:center; gap:8px; border:none;
}
.stop-nav-btn.prev { background:none; border:1px solid rgba(12,11,9,.15); color:var(--muted); }
.stop-nav-btn.prev:hover { border-color:var(--amber); color:var(--amber); }
.stop-nav-btn.next { background:var(--amber); color:#fff; font-weight:500; }
.stop-nav-btn.next:hover { background:var(--amber2); }

/* STOP VISIBILITY */
.stop-content { display:none; }
.stop-content.active { display:block; }

/* MAP PANEL */
.map-panel {
  background:#1A1612; position:sticky; top:42px; height:calc(100vh - 42px);
  display:flex; flex-direction:column; border-left:1px solid rgba(255,255,255,.04);
}
.map-inner { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px; gap:10px; }
.map-pin { font-size:2rem; animation:bounce 2.5s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
.map-caption { font-size:.72rem; color:rgba(240,235,224,.28); text-align:center; line-height:1.6; max-width:20ch; }
.map-next { background:rgba(176,120,48,.08); border:1px solid rgba(176,120,48,.14); padding:14px 18px; margin:0 18px 18px; }
.map-next-label { font-size:.52rem; letter-spacing:.2em; text-transform:uppercase; color:var(--amber2); margin-bottom:5px; }
.map-next-val   { font-size:.8rem; color:rgba(240,235,224,.65); font-family:'Libre Baskerville',serif; font-style:italic; }

/* FOOTER */
footer {
  background:var(--dark); color:var(--paper); padding:24px 6vw;
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:10px; border-top:1px solid var(--line-light);
}
.footer-logo { font-family:'Libre Baskerville',serif; font-size:.9rem; }
.footer-logo span { color:var(--amber); }
.footer-copy { font-size:.6rem; color:rgba(240,235,224,.18); }

/* MOBILE */
@media(max-width:600px){
  .rh-meta { gap:12px; }
  .story-panel { padding:28px 5vw 100px; }
  .stop-title { font-size:1.6rem; }
  .story-body { font-size:.94rem; }
  .stop-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--paper); border-top:1px solid var(--line);
    padding:12px 5vw; z-index:100; flex-direction:row;
    box-shadow:0 -4px 20px rgba(0,0,0,.07);
  }
  .stop-nav-btn.next { flex:1; justify-content:center; }
  .stop-nav-btn.prev { min-width:76px; justify-content:center; }
  footer { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>

<!-- TEST BANNER -->
<div class="test-banner">🧪 Test mode – fri tilgang<span>Betalingssteg deaktivert. Kun for testing.</span></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Lane<span>Stories</span></a>
  <a href="index.html" class="nav-back">← Tilbake til ruteoversikt</a>
</nav>

<!-- ROUTE HEADER (filled by JS) -->
<div class="route-header">
  <div class="rh-inner">
    <p class="rh-kicker" id="rh-kicker"></p>
    <h1 class="rh-title"  id="rh-title"></h1>
    <p class="rh-sub"     id="rh-sub"></p>
    <div class="rh-meta"  id="rh-meta"></div>
  </div>
</div>

<!-- PROGRESS BAR (filled by JS) -->
<div class="progress-bar" id="progress-bar"></div>

<!-- MAIN -->
<div class="route-main">

  <!-- STORY PANEL (filled by JS) -->
  <div class="story-panel" id="story-panel"></div>

  <!-- MAP PANEL -->
  <div class="map-panel">
    <div id="leaflet-map" style="flex:1;min-height:300px;"></div>
    <div class="map-next">
      <div class="map-next-label" id="map-label">Neste stopp</div>
      <div class="map-next-val"   id="map-val">–</div>
    </div>
  </div>

</div>

<footer>
  <span class="footer-logo">Lane<span>Stories</span></span>
  <span class="footer-copy">© 2025 LaneStories.com · Testmodus</span>
</footer>

<script>
// ── Load route from URL ──────────────────────
const params  = new URLSearchParams(window.location.search);
const routeId = params.get('id') || 'dark-lanes';
const route   = ROUTES[routeId] || ROUTES['dark-lanes'];
let current   = 0;
let speechUtterance = null;
let map = null;
let stopMarker = null;
let userMarker = null;
let geoWatchId = null;

// ── Render header ────────────────────────────
document.getElementById('rh-kicker').textContent = route.kicker;
document.getElementById('rh-title').textContent  = route.title;
document.getElementById('rh-sub').textContent    = route.subtitle;
document.title = 'Lane Stories – ' + route.title;

const metaEl = document.getElementById('rh-meta');
route.meta.forEach(([bold, text]) => {
  metaEl.innerHTML += `<div class="rh-meta-item"><strong>${bold}</strong>&nbsp;${text}</div>`;
});

// ── Render progress bar ──────────────────────
const pbEl = document.getElementById('progress-bar');
route.stops.forEach((stop, i) => {
  pbEl.innerHTML += `
    <div class="pb-stop" id="pb-stop-${i}" onclick="goToStop(${i})">
      <div class="pb-num" id="pb-num-${i}">${i + 1}</div>
      <span class="pb-name">${stop.name}</span>
    </div>`;
});

// ── Render all stop panels ───────────────────
const panelEl = document.getElementById('story-panel');
const total   = route.stops.length;

route.stops.forEach((stop, i) => {
  const isLast = i === total - 1;

  const prevBtn = i > 0
    ? `<button class="stop-nav-btn prev" onclick="goToStop(${i - 1})">← Forrige</button>`
    : `<span></span>`;

  const nextBtn = isLast
    ? `<a href="index.html" class="stop-nav-btn next">Finn ny rute →</a>`
    : `<button class="stop-nav-btn next" onclick="goToStop(${i + 1})">${stop.nextLabel || 'Neste stopp →'}</button>`;

  const drinkHtml = stop.drink
    ? `<div class="stop-drink">${stop.drink}</div>` : '';

  const completionHtml = isLast ? `
    <div class="completion-box">
      <p class="completion-label">Ruten er fullført</p>
      <p class="completion-text">${route.completion}</p>
      <a href="index.html" class="completion-link">← Finn en ny rute</a>
    </div>` : '';

  panelEl.innerHTML += `
    <div class="stop-content${i === 0 ? ' active' : ''}" id="stop-${i}">
      <div class="stop-tag"><div class="stop-dot"></div> ${stop.tag}</div>
      <h2 class="stop-title">${stop.name}</h2>
      <p class="stop-venue">${stop.address}</p>
      ${drinkHtml}
      <div class="audio-player">
        <button class="audio-btn" id="audio-btn-${i}" onclick="toggleAudio(${i})">▶</button>
        <div class="audio-label">
          <strong id="audio-label-${i}">Audio guide · Stopp ${i + 1}</strong>
          <span id="audio-sub-${i}">Trykk for å høre historien lest opp — ${stop.audioMin}</span>
        </div>
      </div>
      <div class="story-body">${stop.body}</div>
      ${completionHtml}
      <div class="stop-nav">${prevBtn}${nextBtn}</div>
    </div>`;
});

// ── AUDIO — Web Speech API ───────────────────
function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function toggleAudio(i) {
  const btn   = document.getElementById('audio-btn-' + i);
  const label = document.getElementById('audio-label-' + i);
  const sub   = document.getElementById('audio-sub-' + i);

  if (!window.speechSynthesis) {
    sub.textContent = 'Audio støttes ikke i denne nettleseren.';
    return;
  }

  // If already playing this stop — pause/resume
  if (speechSynthesis.speaking && speechUtterance && speechUtterance._stopIndex === i) {
    if (speechSynthesis.paused) {
      speechSynthesis.resume();
      btn.textContent   = '⏸';
      label.textContent = 'Spiller av...';
    } else {
      speechSynthesis.pause();
      btn.textContent   = '▶';
      label.textContent = 'Satt på pause';
    }
    return;
  }

  // Stop any current playback
  speechSynthesis.cancel();
  resetAudioBtn();

  // Build utterance from stop text
  const text = stripHtml(route.stops[i].body);
  const utt  = new SpeechSynthesisUtterance(text);
  utt._stopIndex = i;
  utt.lang  = 'nb-NO';
  utt.rate  = 0.92;
  utt.pitch = 1;

  // Pick Norwegian voice if available
  const voices = speechSynthesis.getVoices();
  const norVoice = voices.find(v => v.lang.startsWith('nb') || v.lang.startsWith('no'));
  if (norVoice) utt.voice = norVoice;

  utt.onstart = () => {
    btn.textContent   = '⏸';
    label.textContent = 'Spiller av...';
    sub.textContent   = 'Trykk for å sette på pause';
  };
  utt.onend = utt.onerror = () => {
    btn.textContent   = '▶';
    label.textContent = 'Audio guide · Stopp ' + (i + 1);
    sub.textContent   = 'Trykk for å høre historien lest opp — ' + route.stops[i].audioMin;
  };

  speechUtterance = utt;
  speechSynthesis.speak(utt);
}

function resetAudioBtn() {
  route.stops.forEach((stop, i) => {
    const btn = document.getElementById('audio-btn-' + i);
    if (btn) btn.textContent = '▶';
    const lbl = document.getElementById('audio-label-' + i);
    if (lbl) lbl.textContent = 'Audio guide · Stopp ' + (i + 1);
  });
}

// ── MAP — Leaflet + Nominatim geocoding ──────
function initMap() {
  map = L.map('leaflet-map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);
  map.setView([60.393, 5.324], 13); // Bergen default

  // GPS: watch user position
  if (navigator.geolocation) {
    geoWatchId = navigator.geolocation.watchPosition(pos => {
      const ll = [pos.coords.latitude, pos.coords.longitude];
      if (!userMarker) {
        const userIcon = L.divIcon({
          className: '',
          html: '<div style="width:14px;height:14px;background:#4A90D9;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(74,144,217,.7);"></div>',
          iconSize: [14, 14], iconAnchor: [7, 7]
        });
        userMarker = L.marker(ll, { icon: userIcon }).addTo(map);
      } else {
        userMarker.setLatLng(ll);
      }
    }, null, { enableHighAccuracy: true, maximumAge: 5000 });
  }
}

function geocodeAndPan(address) {
  const url = 'https://nominatim.openstreetmap.org/search?q='
    + encodeURIComponent(address + ', Bergen, Norway')
    + '&format=json&limit=1';

  fetch(url, { headers: { 'Accept-Language': 'no' } })
    .then(r => r.json())
    .then(data => {
      if (!data.length) return;
      const ll = [parseFloat(data[0].lat), parseFloat(data[0].lon)];

      if (stopMarker) map.removeLayer(stopMarker);

      const stopIcon = L.divIcon({
        className: '',
        html: '<div style="width:22px;height:22px;background:#B07830;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;"></div>',
        iconSize: [22, 22], iconAnchor: [11, 11]
      });
      stopMarker = L.marker(ll, { icon: stopIcon })
        .addTo(map)
        .bindPopup(route.stops[current].name, { closeButton: false })
        .openPopup();

      map.setView(ll, 16, { animate: true });
    })
    .catch(() => {});
}

// ── Navigation ───────────────────────────────
function goToStop(i) {
  // Stop audio
  if (window.speechSynthesis) speechSynthesis.cancel();
  resetAudioBtn();

  document.querySelectorAll('.stop-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.pb-stop').forEach((el, j) => {
    el.classList.remove('active');
    const num = document.getElementById('pb-num-' + j);
    num.style.background = j < i ? 'var(--amber)' : '';
    num.style.color      = j < i ? 'var(--ink)'   : '';
  });

  document.getElementById('stop-' + i).classList.add('active');
  document.getElementById('pb-stop-' + i).classList.add('active');
  current = i;

  document.getElementById('map-val').textContent   = route.stops[i].mapNext;
  document.getElementById('map-label').textContent = route.stops[i].mapLabel;

  // Geocode and pan map
  if (map) geocodeAndPan(route.stops[i].address);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ─────────────────────────────────────
// Voices may load async in some browsers
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => {};
}

window.addEventListener('load', () => {
  initMap();
  goToStop(0);
});
</script>
</body>
</html>
