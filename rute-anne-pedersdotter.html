<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Annes kveld · Bergen · Lane Stories</title>
  <meta name="description" content="To stopp. Én skjebne. 800 år med Bergen-historier som aldri kom med i guidebøkene." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --gold:#c9a96e; --gold-dim:rgba(201,169,110,0.4); --gold-faint:rgba(201,169,110,0.08);
      --ink:#0d0a07; --ink2:#121008; --cream:#f0e6d0; --cream-dim:#c8b896;
      --muted:#7a6a52; --border:rgba(232,220,200,0.11);
      --red:rgba(200,80,60,0.12); --red-b:rgba(200,80,60,0.4);
    }
    html { scroll-behavior:smooth; }
    body { background:var(--ink); color:var(--cream); font-family:'EB Garamond',Georgia,serif; line-height:1.6; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; }

    /* ── SCREENS ── */
    .screen { display:none; min-height:100vh; flex-direction:column; max-width:480px; margin:0 auto; }
    .screen.active { display:flex; animation:fadeUp 0.35s ease both; }

    /* ── TOPBAR ── */
    .topbar { display:flex; align-items:center; padding:18px 24px; border-bottom:1px solid var(--border); flex-shrink:0; gap:14px; }
    .topbar-logo { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.3em; color:var(--gold); text-decoration:none; }
    .topbar-back { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:0; line-height:1; }
    .topbar-back:hover { color:var(--cream); }
    .topbar-count { margin-left:auto; font-size:11px; letter-spacing:0.15em; color:#4a4030; font-family:'Cinzel',serif; }

    /* ── PROGRESS ── */
    .prog-wrap { display:flex; gap:4px; padding:10px 24px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .prog-seg { flex:1; height:2px; border-radius:2px; background:rgba(232,220,200,0.1); transition:background 0.5s; }
    .prog-seg.done   { background:var(--gold); }
    .prog-seg.active { background:rgba(201,169,110,0.4); }

    /* ── BODY ── */
    .body { flex:1; padding:0 24px 64px; overflow-y:auto; }

    /* ── TYPOGRAPHY ── */
    .eyebrow { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:8px; }
    h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(36px,8vw,52px); font-weight:300; line-height:1.08; color:var(--cream); margin-bottom:12px; }
    h2 { font-family:'Cormorant Garamond',serif; font-size:clamp(26px,6vw,36px); font-weight:300; color:var(--cream); margin-bottom:8px; line-height:1.15; }
    .sub { font-size:14px; font-style:italic; color:var(--muted); margin-bottom:20px; line-height:1.7; }
    .rule { width:36px; height:2px; background:linear-gradient(90deg,var(--gold),rgba(201,169,110,0.1)); border-radius:1px; margin-bottom:28px; }
    p { font-size:15px; color:var(--cream-dim); line-height:1.9; margin-bottom:1em; }

    /* ── HERO VISUAL ── */
    .hero-vis { height:200px; background:linear-gradient(160deg,#120a0a,#2a1008,#120a0a); display:flex; align-items:center; justify-content:center; font-size:72px; position:relative; overflow:hidden; flex-shrink:0; }
    .hero-vis::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 60%,rgba(201,169,110,0.12) 0%,transparent 70%); }
    .hero-vis::after  { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(201,169,110,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.04) 1px,transparent 1px); background-size:40px 40px; }

    /* ── ROUTE INFO ── */
    .route-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
    .route-meta-pill { display:flex; align-items:center; gap:6px; padding:6px 13px; border:1px solid var(--border); border-radius:20px; font-size:12px; color:var(--muted); background:rgba(255,255,255,0.015); }
    .route-meta-pill span:first-child { color:var(--gold); font-size:13px; }

    .tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:28px; }
    .tag { display:inline-block; padding:3px 11px; border:1px solid var(--gold-dim); border-radius:20px; font-size:11px; color:var(--gold); letter-spacing:0.04em; }

    /* ── BUTTONS ── */
    .btn { display:block; width:100%; padding:16px 20px; background:linear-gradient(135deg,#c9a96e,#8a5a2a); color:var(--ink); border:none; border-radius:2px; font-family:'Cinzel',serif; font-size:12px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; margin-bottom:10px; transition:opacity 0.2s,transform 0.15s; text-align:center; }
    .btn:hover { opacity:0.88; transform:translateY(-1px); }
    .btn-outline { display:block; width:100%; padding:14px 20px; background:transparent; color:var(--gold); border:1px solid var(--gold-dim); border-radius:2px; font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; margin-bottom:10px; transition:background 0.2s; text-align:center; text-decoration:none; }
    .btn-outline:hover { background:var(--gold-faint); }

    /* ── WHAT'S INCLUDED ── */
    .incl-list { margin-bottom:28px; }
    .incl-item { display:flex; gap:12px; font-size:14px; color:var(--muted); margin-bottom:10px; align-items:flex-start; }
    .incl-item span:first-child { color:var(--gold); flex-shrink:0; margin-top:2px; }

    /* ── STOP ICON ── */
    .stop-icon { text-align:center; font-size:56px; margin:28px 0 18px; }
    .stop-location { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:20px; letter-spacing:0.05em; }
    .stop-location::before { content:'📍'; font-size:13px; }

    /* ── STORY BOX ── */
    .story-box { background:rgba(255,255,255,0.022); border:1px solid var(--border); border-radius:2px; padding:24px 26px; margin-bottom:20px; }
    .story-box p { font-size:15.5px; color:var(--cream-dim); line-height:1.92; margin-bottom:1.1em; }
    .story-box p:last-child { margin-bottom:0; }
    .story-box .pull-quote { font-family:'Cormorant Garamond',serif; font-size:clamp(18px,4vw,22px); font-style:italic; font-weight:300; color:var(--cream); line-height:1.55; border-left:2px solid var(--gold); padding-left:18px; margin:20px 0; }

    /* ── SECRET / INSIDER TIP ── */
    .secret-box { background:rgba(201,169,110,0.06); border:1px solid rgba(201,169,110,0.28); border-radius:2px; padding:20px 22px; margin-bottom:20px; }
    .secret-lbl { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:10px; }
    .secret-txt { font-size:14px; color:var(--gold); line-height:1.78; }

    /* ── HISTORICAL BACKGROUND (collapsible) ── */
    .hist-bg { border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:20px; }
    .hist-bg-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; background:rgba(255,255,255,0.02); user-select:none; }
    .hist-bg-label { font-size:12px; color:var(--muted); letter-spacing:0.04em; }
    .hist-bg-arrow { font-size:11px; color:var(--muted); transition:transform 0.25s; display:inline-block; }
    .hist-bg-arrow.open { transform:rotate(180deg); }
    .hist-bg-body { font-size:14px; color:var(--cream-dim); line-height:1.82; max-height:0; overflow:hidden; transition:max-height 0.45s ease, padding 0.3s; padding:0 16px; }
    .hist-bg-body.open { max-height:800px; padding:16px; }
    .hist-bg-body p { margin-bottom:0.85em; }
    .hist-bg-body p:last-child { margin-bottom:0; }

    /* ── AUDIO GUIDE ── */
    .audio-guide { border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:20px; }
    .audio-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:rgba(255,255,255,0.02); gap:12px; }
    .audio-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); }
    .audio-sublbl { font-size:11px; color:var(--muted); margin-top:2px; }
    .audio-play-btn { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#c9a96e,#8a5a2a); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity 0.2s; }
    .audio-play-btn:hover { opacity:0.85; }
    .audio-play-icon { width:0; height:0; border-style:solid; border-width:5px 0 5px 9px; border-color:transparent transparent transparent var(--ink); margin-left:2px; }
    .audio-progress { height:2px; background:rgba(232,220,200,0.1); }
    .audio-progress-bar { height:100%; background:var(--gold); width:0%; transition:width 0.3s; }
    .audio-note { font-size:11px; color:var(--muted); padding:8px 14px; text-align:center; border-top:1px solid var(--border); background:rgba(255,255,255,0.01); font-style:italic; }

    /* ── MAP ── */
    .map-wrap { border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:20px; }
    .map-canvas iframe { width:100%; height:210px; border:none; display:block; filter:sepia(0.2) contrast(1.05) brightness(0.85); }
    .map-footer { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:rgba(255,255,255,0.02); border-top:1px solid var(--border); gap:10px; flex-wrap:wrap; }
    .map-legend { display:flex; gap:14px; }
    .map-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
    .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .legend-dot.dest { background:#c9a96e; box-shadow:0 0 0 3px rgba(201,169,110,0.25); }
    .map-nav-btn { padding:7px 14px; background:linear-gradient(135deg,#c9a96e,#8a5a2a); color:var(--ink); border:none; border-radius:2px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; white-space:nowrap; text-decoration:none; display:inline-block; }

    /* ── DRINK TIP ── */
    .drink-tip { border:1px solid rgba(201,169,110,0.3); border-radius:2px; padding:18px 20px; margin-bottom:20px; background:rgba(201,169,110,0.05); }
    .drink-tip-label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:10px; }
    .drink-tip-body { font-size:14px; color:var(--cream-dim); line-height:1.78; }

    /* ── ROUTE STOPS NAV ── */
    .stop-nav { display:flex; align-items:center; gap:4px; margin-bottom:20px; }
    .sn-item { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .sn-dot { width:26px; height:26px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:9px; color:var(--muted); background:var(--ink); transition:all 0.3s; flex-shrink:0; }
    .sn-dot.done   { background:var(--gold); border-color:var(--gold); color:var(--ink); }
    .sn-dot.active { border-color:var(--gold); color:var(--gold); }
    .sn-label { font-size:9px; color:var(--muted); max-width:52px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:0.04em; }
    .sn-line { flex:1; height:1px; background:var(--border); margin-bottom:14px; }

    /* ── COMPLETE ── */
    .complete-wrap { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:48px 28px 64px; }
    .complete-icon { font-size:64px; margin-bottom:24px; }
    .reward-box { background:var(--gold-faint); border:1px solid rgba(201,169,110,0.25); border-radius:2px; padding:24px 28px; margin:24px 0 32px; width:100%; text-align:left; }
    .reward-lbl { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:14px; }
    .reward-place { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--cream); margin-bottom:4px; }
    .reward-note { font-size:13px; color:var(--muted); line-height:1.7; }

    /* ── LANG TOGGLE ── */
    .lang-toggle { position:fixed; top:18px; right:20px; z-index:200; display:flex; gap:6px; }
    .lang-btn { padding:5px 12px; border:1px solid var(--border); border-radius:20px; background:rgba(13,10,7,0.85); color:var(--muted); font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; cursor:pointer; transition:border-color 0.2s,color 0.2s; backdrop-filter:blur(8px); }
    .lang-btn.active { border-color:var(--gold-dim); color:var(--gold); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.45} }

    @media(max-width:480px){ .body { padding-left:20px; padding-right:20px; } .topbar { padding:16px 20px; } }
  </style>
</head>
<body>

<!-- Language toggle -->
<div class="lang-toggle">
  <button class="lang-btn" id="btn-no" onclick="setLang('no')">NO</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

     SCREEN 2 · STOPP 2: HEKSESTEINEN
══════════════════════════════════ -->
<div class="screen" id="s-stop2">
  <div class="topbar">
    <button class="topbar-back" onclick="goToStop(1)">←</button>
    <a class="topbar-logo" href="bergen.html">Lane Stories</a>
    <span class="topbar-count" id="s2-count"></span>
  </div>
  <div class="prog-wrap">
    <div class="prog-seg done"   id="p2-1"></div>
    <div class="prog-seg active" id="p2-2"></div>
    <div class="prog-seg"        id="p2-3"></div>
  </div>

  <div class="body" style="padding-top:24px;">

    <div class="stop-nav">
      <div class="sn-item">
        <div class="sn-dot done">✓</div>
        <div class="sn-label" id="s2-nav1"></div>
      </div>
      <div class="sn-line"></div>
      <div class="sn-item">
        <div class="sn-dot active">2</div>
        <div class="sn-label" id="s2-nav2"></div>
      </div>
      <div class="sn-line"></div>
      <div class="sn-item">
        <div class="sn-dot">🍷</div>
        <div class="sn-label" id="s2-nav3"></div>
      </div>
    </div>

    <span class="eyebrow" id="s2-eyebrow"></span>
    <h2 id="s2-title"></h2>
    <div class="stop-location" id="s2-loc"></div>
    <div class="rule"></div>

    <!-- MAP -->
    <div class="map-wrap">
      <div class="map-canvas">
        <iframe
          src="https://www.openstreetmap.org/export/embed.html?bbox=5.3040%2C60.3895%2C5.3140%2C60.3935&layer=mapnik&marker=60.3915%2C5.3090"
          title="Kart – Heksesteinen, Nordnesparken"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
      <div class="map-footer">
        <div class="map-legend">
          <div class="map-legend-item"><div class="legend-dot dest"></div><span id="s2-map-lbl"></span></div>
        </div>
        <a class="map-nav-btn" href="https://maps.google.com/?q=Nordnesparken+Bergen" target="_blank" id="s2-nav-btn"></a>
      </div>
    </div>

    <!-- AUDIO GUIDE -->
    <div class="audio-guide">
      <div class="audio-header">

      <p>Finn steinen. Den er nesten fem meter høy, laget av hardangerskifer, reist i 2002. Innskriften er enkel:</p>

      <p>Femten år hadde gått siden første anklage. Absalon var lenge borte. Anklagene kom tilbake — denne gangen fra kvinner i Bergen. Noen sa hun hadde helbredet dem på overnaturlig vis. Andre sa hun hadde forgjort dem. Logikken var sirkulær: hvis du kurerte noen, var det trolldom. Hvis noen ble syk etter å ha besøkt deg, var det trolldom. Det fantes ingen handling du kunne gjøre deg uskyldig med.</p>

      <p>Stand outside the Cathedral and look up. The building is old enough to have been here that evening — not in this exact form, but on this ground, in this light, in this street.</p>

      <div class="pull-quote">"Absalon Pederssøn Beyer was Bergen's most learned man. His wife was not stupid."</div>

      <p>Anne Pedersdotter married Absalon Beyer sometime in the 1560s. She was young. He was already a respected humanist, historian and deacon — attached to this very church. Together they formed one of Bergen's most prominent couples. They knew the city councillors and the judges. They were invited to the right dinners. Anne was seen.</p>

      <p>Find the stone. It is nearly five metres tall, made of Hardanger slate, erected in 2002. The inscription is simple:</p>

      <p>Anne Pedersdotter was not merely one of those numbers. She was the first. What happened here, on this ground, on 7 April 1590, set something in motion that did not stop for generations.</p>

      <p>Fifteen years had passed since the first accusation. Absalon had long been gone. The accusations returned — this time from women in Bergen. Some said she had healed them by supernatural means. Others said she had cursed them. The logic was circular: if you cured someone, it was witchcraft. If someone fell ill after visiting you, it was witchcraft. There was no act by which you could prove your innocence.</p>

  set('c-note',       t.c_note);
  set('c-cta',        t.c_cta);
  set('c-home',       t.c_home);

  /* Lang buttons */
  document.getElementById('btn-no').classList.toggle('active', lang === 'no');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
}

function set(id, val)     { const el=document.getElementById(id); if(el) el.textContent=val||''; }
function setHTML(id, val) { const el=document.getElementById(id); if(el) el.innerHTML=val||''; }

/* ── NAVIGATION ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); window.scrollTo(0,0); }
}
function goToIntro()   { showScreen('s-intro');    }
function goToStop(n)   { showScreen('s-stop' + n); }
function goToComplete(){ showScreen('s-complete'); }
function goBack() {
  const ref = document.referrer;
  if (ref && ref.includes('bergen')) { window.history.back(); }
  else { window.location.href = 'bergen.html'; }
}

/* ── COLLAPSIBLE HISTORY ── */
function toggleHist(id) {
  const body  = document.getElementById(id + '-body');
  const arrow = document.getElementById(id + '-arrow');
  if (!body) return;
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

/* ── AUDIO (placeholder — TTS to be added) ── */
const audioState = {};
function toggleAudio(stopId) {
  if (!audioState[stopId]) audioState[stopId] = { playing: false, pct: 0 };
  const st = audioState[stopId];
  st.playing = !st.playing;
  const icon = document.getElementById(stopId + '-play-icon');
  if (st.playing) {
    icon.outerHTML = '<div class="audio-pause-icon" id="' + stopId + '-play-icon"><span></span><span></span></div>';
    // Simulate progress for demo
    simulateProgress(stopId, st);
  } else {
    icon.outerHTML = '<div class="audio-play-icon" id="' + stopId + '-play-icon"></div>';
    clearInterval(st.timer);
  }
}
function simulateProgress(stopId, st) {
  clearInterval(st.timer);
  st.timer = setInterval(() => {
    st.pct = Math.min(100, st.pct + 0.4);
    const bar = document.getElementById(stopId + '-progress');
    if (bar) bar.style.width = st.pct + '%';
    if (st.pct >= 100) {
      clearInterval(st.timer);
      st.playing = false;
      const icon = document.getElementById(stopId + '-play-icon');
      if (icon) icon.outerHTML = '<div class="audio-play-icon" id="' + stopId + '-play-icon"></div>';
    }
  }, 200);
}

/* ── INIT ── */
applyLang(detectLang());
</script>
